spring:
  application:
    name: api-gateway

  # Disable Spring Boot's default web MVC auto-configuration
  # Gateway uses WebFlux (reactive), not servlet stack
  main:
    web-application-type: reactive

server:
  port: 8080

finsight:
  jwt:
    secret: finsight_jwt_secret_key_must_be_at_least_32_bytes_long

logging:
  level:
    com.finsight: DEBUG
    org.springframework.cloud.gateway: DEBUG
spring:
  application:
    name: conversation-service

  datasource:
    url: jdbc:postgresql://localhost:5432/finsight?currentSchema=conversations
    username: adewole
    password: adewole
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: "SET search_path TO conversations, documents, public"

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: conversations
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

  flyway:
    enabled: true
    schemas: conversations
    default-schema: conversations
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8083

finsight:
  groq:
    api-key: ${GROQ_API_KEY}
    base-url: https://api.groq.com/openai/v1
    model: llama-3.3-70b-versatile
  jina:
    api-key: ${JINA_API_KEY}
    base-url: https://api.jina.ai/v1
    model: jina-embeddings-v2-base-en
  rag:
    max-context-chunks: 5

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.finsight: DEBUG